name: Build and Deploy Docker

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-image-and-push-job:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Build docker image and push to Github Registry
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ github.event.repository.name}}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


  auto-deploy-docker-job:
    runs-on: ubuntu-latest
    needs: build-image-and-push-job
    environment: SERVER_DETAILS
    env:
      CONTAINER_NAME: ${{ github.actor }}
      SERVER_PORT: 7891
      # แก้ไข 1: ลบช่องว่างหลังเครื่องหมาย :
      DOCKER_IMAGE_URL: 'ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${{ github.ref_name }}'
    steps:
      - name: Execute remote ssh using password to production server
        uses: appleboy/ssh-action@v1.2.5 
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            docker -v
            docker logout ghcr.io
            # แก้ไข 2: ลบ path ด้านหลังออก ให้เหลือแค่ ghcr.io
            docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker rm -f ${{ env.CONTAINER_NAME }} || true
            docker pull ${{ env.DOCKER_IMAGE_URL }}
            docker run --restart=always -d --name ${{ env.CONTAINER_NAME }} -p ${{ env.SERVER_PORT }}:80 ${{ env.DOCKER_IMAGE_URL }}
            
            

          