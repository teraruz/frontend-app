name: Deploy to Github Page

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-prod-job:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo 
        uses: actions/checkout@v6
      - name: Setup Node.js version to 24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci #clean install แทน npm install
      - name: Build Project
        run: npm run build #สร้างโปรเจกต์