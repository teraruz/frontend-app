name: Deploy to Github Page

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-prod-job:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v5
      - name: Setup node js v24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      #- run: node -v
      - name: Install dependencies
        run: npm ci #clean i เเทน npm i
      - name: Build Project
        run: npm run build
      - name: upload dist folder artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-production
          path: dist

  auto-deploy-github-page:
    runs-on: ubuntu-latest
    needs: build-prod-job
    permissions:
      contents: write
    steps:
      - name: Download dist folder artifact
        uses: actions/download-artifact@v7
        with:
          name: dist-production
          path: dist
      - run: ls dist
      - uses: actions/checkout@v5
      - name: Deploy to github page
        uses: SerhiiKa/VuePagesAction@1.0.4
        with:
          username: ${{github.actor}}
          reponame: ${{github.event.repository.name}}
          token: ${{ secrets.GITHUB_TOKEN }}